apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: homelab
  namespace: argocd
  annotations:
    # Applied before other apps/ manifests so Applications can reference
    # this project on the same sync as their creation.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: Workload applications for the homelab (Ollama, monitoring, future services)
  sourceRepos:
    - https://github.com/koydas/gitops-homelab.git
    - https://helm.otwld.com/
    - https://prometheus-community.github.io/helm-charts
  destinations:
    - namespace: ollama
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    # Add a line here for each new namespace as new workload apps are added.
  clusterResourceWhitelist:
    # Required by kube-prometheus-stack: CRDs (ServiceMonitor, Prometheus, etc.),
    # the prometheus-operator/grafana/node-exporter ClusterRole(Binding)s, its
    # admission-webhook cert-patch job, and the `monitoring` namespace itself
    # (CreateNamespace=true alone was not sufficient here).
    - group: ""
      kind: Namespace
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 87.19.1
    helm:
      valuesObject:
        # The chart's largest CRDs (prometheuses, alertmanagers, etc.) exceed the
        # 262144-byte last-applied-configuration annotation limit, and ArgoCD does not
        # honor the Application-level ServerSideApply=true syncOption for a chart's own
        # crds/ directory -- every auto-sync re-attempts a plain patch and fails. Those
        # CRDs were installed once out-of-band (`kubectl apply --server-side
        # --force-conflicts`, see runbook.md) and are left alone from here on.
        crds:
          enabled: false
        prometheus:
          prometheusSpec:
            retention: 15d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: microk8s-hostpath
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi
            # nvidia-dcgm-exporter (gpu-operator-resources namespace) isn't labeled for the
            # chart's own release-scoped selector, and lives outside this Application's
            # namespace — select all ServiceMonitors, in all namespaces, instead.
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelector: {}
            serviceMonitorNamespaceSelector: {}
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 1Gi
        alertmanager:
          alertmanagerSpec:
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
        prometheusOperator:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
        kube-state-metrics:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
        prometheus-node-exporter:
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
        # These monitor kubeadm-style static control-plane pods (via new Services created
        # in kube-system) that microk8s doesn't expose the same way; out of scope for the
        # GPU-monitoring goal here, and would otherwise need kube-system write access.
        kubeControllerManager:
          enabled: false
        kubeEtcd:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
        coreDns:
          enabled: false
        grafana:
          service:
            type: LoadBalancer
          # Without this, Grafana's SQLite user DB (including the admin password's
          # actual hash) lives on the pod's ephemeral filesystem and gets rebuilt from
          # whatever the auto-generated Secret holds at boot time -- which drifts across
          # syncs (see runbook.md), locking users out after any pod restart.
          persistence:
            enabled: true
            type: sts
            storageClassName: microk8s-hostpath
            accessModes: ["ReadWriteOnce"]
            size: 1Gi
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # kube-prometheus-stack's largest CRDs (Prometheus, Alertmanager, ThanosRuler, ...)
      # exceed the 262144-byte last-applied-configuration annotation limit under a plain
      # apply -- the same class of issue already hit installing ArgoCD itself (see runbook.md).
      - ServerSideApply=true

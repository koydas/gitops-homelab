apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nvidia-dcgm-exporter
  namespace: monitoring
  annotations:
    # Applied after the monitoring Application (wave 0) so the ServiceMonitor CRD
    # (installed by that chart) already exists in the cluster.
    argocd.argoproj.io/sync-wave: "1"
spec:
  namespaceSelector:
    matchNames:
      - gpu-operator-resources
  selector:
    matchLabels:
      app: nvidia-dcgm-exporter
  endpoints:
    - port: gpu-metrics
      interval: 30s
